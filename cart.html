<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <title>Shopping Cart | SIP COFFEE</title>
  <link rel="stylesheet" href="css/cart.css">
</head>

<body>

  <header class="header">
    <div class="container header-container">
      <a href="index.html" class="logo">☕ SIP COFFEE</a>
    </div>
  </header>

  <main class="cart-page">
    <div class="container">

      <div class="cart-header">
        <h1>🛒 Shopping Cart</h1>
        <p>Review your items before completing payment</p>
      </div>

      <div class="cart-layout">

        <!-- Products -->
        <section class="cart-items" id="cart-items">
          <!-- item element (generated by JS) -->
        </section>

        <!-- Order Summary -->
        <aside class="cart-summary">
          <h3>Order Summary</h3>

          <div class="summary-row">
            <span>Subtotal</span>
            <span id="cart-total">0 SAR</span>
          </div>

          <div class="summary-row">
            <span>Delivery</span>
            <span>Free</span>
          </div>

          <hr>

          <div class="summary-total">
            <span>Total</span>
            <strong id="cart-grand-total">0 SAR</strong>
          </div>

          <a href="payment.html" class="btn primary">Checkout</a>

          <a href="index.html" class="continue">← Continue Shopping</a>
        </aside>

      </div>
    </div>
  </main>

  <script src="js/cart.js"></script>
</body>

</html>
